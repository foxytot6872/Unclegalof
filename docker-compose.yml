services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -c "npm run prisma:generate --workspace server && npm run dev --workspace server"
    ports:
      - "4001:4001"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      PORT: 4001
      CLIENT_ORIGIN: http://localhost:5173

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -c "npm run dev --workspace client -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      VITE_PROXY_TARGET: http://server:4001
    depends_on:
      - server

volumes:
  root_node_modules:
